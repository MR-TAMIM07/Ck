<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐓𝐀𝐌𝐈𝐌 ⸙ 𝐋𝐈𝐕𝐄 𝐓𝐕</title>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Video.js CSS -->
    <link rel="stylesheet" href="https://vjs.zencdn.net/8.10.0/video-js.css">

    <style>
        :root {
            --bg: #060608;
            --card-bg: #0d0d12;
            --neon-cyan: #00fff7;
            --neon-pink: #ff00e6;
            --neon-purple: #b400ff;
            --text: #e8faff;
            --danger: #ff3360;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #14141c 0%, #060608 60%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .tv-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(0, 255, 247, 0.18);
            box-shadow:
                0 0 25px rgba(0, 255, 247, 0.08),
                0 0 50px rgba(180, 0, 255, 0.06),
                0 20px 40px rgba(0, 0, 0, 0.8);
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .tv-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
        }

        .tv-title {
            font-size: 0.95rem;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 6px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
        }

        .tv-author {
            font-size: 0.7rem;
            color: var(--neon-cyan);
            opacity: 0.75;
            margin-bottom: 14px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,255,247,0.35), transparent);
            margin: 12px 0 16px;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            border: 1.5px solid rgba(0, 255, 247, 0.25);
            box-shadow: 0 0 25px rgba(180, 0, 255, 0.12);
            background: #000;
            margin-bottom: 20px;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        .video-js .vjs-big-play-button {
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)) !important;
            border: none !important;
            color: #000 !important;
            border-radius: 50% !important;
            width: 60px !important;
            height: 60px !important;
            line-height: 60px !important;
            margin-left: -30px !important;
            margin-top: -30px !important;
            box-shadow: 0 0 20px rgba(255, 0, 230, 0.5);
        }

        .channel-list-title {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .channel-list-title::before {
            content: "➜";
            color: var(--neon-pink);
        }

        /* Search Bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 14px;
        }

        .search-wrapper i.fa-magnifying-glass {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-cyan);
            opacity: 0.7;
            font-size: 0.85rem;
            pointer-events: none;
        }

        #channelSearch {
            width: 100%;
            padding: 11px 38px 11px 38px;
            border-radius: 10px;
            border: 1.5px solid rgba(0, 255, 247, 0.18);
            background: rgba(0, 255, 247, 0.03);
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            outline: none;
            transition: all 0.3s ease;
        }

        #channelSearch::placeholder {
            color: rgba(232, 250, 255, 0.4);
            font-weight: 500;
        }

        #channelSearch:focus {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 230, 0.05);
            box-shadow: 0 0 15px rgba(180, 0, 255, 0.18);
        }

        .search-clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--neon-pink);
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0.7;
            display: none;
            padding: 4px;
        }

        .search-clear-btn:hover {
            opacity: 1;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .channel-grid::-webkit-scrollbar {
            width: 5px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
        }

        .channel-btn {
            padding: 12px 10px;
            border-radius: 10px;
            border: 1.5px solid rgba(0, 255, 247, 0.15);
            background: rgba(0, 255, 247, 0.03);
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
        }

        .channel-btn:hover {
            border-color: var(--neon-pink);
            background: rgba(255, 0, 230, 0.08);
            transform: translateY(-2px);
        }

        .channel-btn.active {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: #000;
            border-color: var(--neon-pink);
            box-shadow: 0 4px 18px rgba(180, 0, 255, 0.4);
        }

        .channel-btn mark {
            background: var(--neon-pink);
            color: #000;
            border-radius: 3px;
            padding: 0 2px;
        }

        .channel-btn.active mark {
            background: #000;
            color: var(--neon-cyan);
        }

        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 20px;
            opacity: 0.7;
            font-size: 0.8rem;
        }

        .tv-status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .tv-status {
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.8;
            margin: 0;
        }

        .switch-source-btn {
            background: rgba(255, 0, 230, 0.08);
            border: 1px solid rgba(255, 0, 230, 0.35);
            color: var(--neon-pink);
            font-size: 0.68rem;
            font-weight: 700;
            padding: 5px 11px;
            border-radius: 20px;
            cursor: pointer;
            letter-spacing: 0.5px;
            white-space: nowrap;
            transition: all 0.25s ease;
        }

        .switch-source-btn:hover {
            background: rgba(255, 0, 230, 0.18);
            box-shadow: 0 0 12px rgba(255, 0, 230, 0.3);
        }

        .switch-source-btn:active {
            transform: scale(0.95);
        }

        .tv-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--neon-pink);
            opacity: 0.8;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="tv-container">
        <div class="tv-title"><i class="fas fa-satellite-dish"></i> 𝐓𝐀𝐌𝐈𝐌 𝐋𝐈𝐕𝐄 𝐓𝐕</div>
        <div class="tv-author">⚡ 𝘱𝘰𝘸𝘦𝘳𝘦𝘥 𝘣𝘺 ♡—͟͞͞𝐓𝐀𝐌𝐈𝐌 ⸙</div>

        <hr class="divider">

        <!-- Player -->
        <div class="player-wrapper">
            <video id="saif-tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                <p class="vjs-no-js">Please enable JavaScript to view this stream.</p>
            </video>
        </div>

        <!-- Search -->
        <div class="search-wrapper">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" id="channelSearch" placeholder="Search channel name..." autocomplete="off">
            <button class="search-clear-btn" id="searchClearBtn" title="Clear search"><i class="fas fa-circle-xmark"></i></button>
        </div>

        <!-- Channel Grid -->
        <div class="channel-list-title">Select Channel</div>
        <div class="channel-grid" id="tvChannelGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 20px; opacity: 0.7;">
                <i class="fas fa-spinner fa-spin"></i> Fetching Live Streams...
            </div>
        </div>

        <div class="tv-status-row">
            <div class="tv-status" id="tvStatusText">➜ Ready</div>
            <button class="switch-source-btn" id="switchSourceBtn" title="Try another source / reload"><i class="fas fa-rotate"></i> Switch Source</button>
        </div>

        <hr class="divider">
        <div class="tv-footer">━━━━━ ♡—͟͞͞𝐓𝐀𝐌𝐈𝐌 ⸙ ━━━━━</div>
    </div>

    <!-- Video.js Script Engine -->
    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const player = videojs('saif-tv-player', {
                fluid: true,
                autoplay: false,
                controls: true
            });

            const gridContainer = document.getElementById('tvChannelGrid');
            const statusText = document.getElementById('tvStatusText');
            const searchInput = document.getElementById('channelSearch');
            const searchClearBtn = document.getElementById('searchClearBtn');
            const switchSourceBtn = document.getElementById('switchSourceBtn');

            const m3uUrl = 'https://raw.githubusercontent.com/marufmoinuddin/iptv/refs/heads/main/tv.m3u';

            let allChannels = [];
            let currentChannel = null;
            let currentSourceIndex = 0;
            let stallTimer = null;

            // If the player stalls/buffers for too long, hint the user to switch source
            // instead of letting it spin forever with no feedback.
            player.on('waiting', function () {
                clearTimeout(stallTimer);
                stallTimer = setTimeout(function () {
                    if (currentChannel) {
                        statusText.innerHTML = `➜ <span style="color: var(--neon-pink); font-weight:bold;">Buffering...</span> network slow or source busy (high traffic during live matches) — try "Switch Source" 👇`;
                    }
                }, 8000);
            });

            player.on('playing', function () {
                clearTimeout(stallTimer);
                if (currentChannel) {
                    statusText.innerHTML = `➜ Playing: <span style="color: var(--neon-cyan); font-weight:bold;">${currentChannel.name}</span>`;
                }
            });

            switchSourceBtn.addEventListener('click', function () {
                if (!currentChannel) return;
                const nextIndex = (currentSourceIndex + 1) % currentChannel.urls.length;
                player.off('error');
                attemptPlay(currentChannel, player, nextIndex);
            });

            async function loadM3uPlaylist() {
                try {
                    const response = await fetch(m3uUrl);
                    if (!response.ok) throw new Error('Network response was not ok');
                    const text = await response.text();

                    const channels = parseM3U(text);
                    if (channels.length === 0) {
                        gridContainer.innerHTML = '<div class="no-results" style="color: var(--danger);">No channels found.</div>';
                        return;
                    }

                    allChannels = channels;
                    renderChannels(allChannels, player, true);
                } catch (error) {
                    console.error('Error fetching playlist:', error);
                    gridContainer.innerHTML = '<div class="no-results" style="color: var(--danger);"><i class="fas fa-exclamation-triangle"></i> Failed to load streams. CORS Block or Network issue.</div>';
                }
            }

            function parseM3U(data) {
                const lines = data.split('\n');
                const channelMap = new Map(); // name -> [urls]
                const order = [];
                let currentChannelName = '';

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();

                    if (line.startsWith('#EXTINF:')) {
                        const commaIndex = line.indexOf(',');
                        if (commaIndex !== -1) {
                            currentChannelName = line.substring(commaIndex + 1).trim();
                        } else {
                            currentChannelName = 'Live Channel';
                        }
                    } else if (line.startsWith('http://') || line.startsWith('https://')) {
                        if (currentChannelName) {
                            // Same channel name can appear more than once in the playlist
                            // (e.g. multiple T Sports mirrors) — keep all urls as fallback sources
                            if (!channelMap.has(currentChannelName)) {
                                channelMap.set(currentChannelName, []);
                                order.push(currentChannelName);
                            }
                            channelMap.get(currentChannelName).push(line);
                            currentChannelName = '';
                        }
                    }
                }
                return order.map(name => ({ name, urls: channelMap.get(name) }));
            }

            function highlightMatch(name, query) {
                if (!query) return name;
                const idx = name.toLowerCase().indexOf(query.toLowerCase());
                if (idx === -1) return name;
                return name.substring(0, idx) +
                    '<mark>' + name.substring(idx, idx + query.length) + '</mark>' +
                    name.substring(idx + query.length);
            }

            function attemptPlay(channel, videoPlayer, sourceIndex) {
                if (sourceIndex >= channel.urls.length) {
                    statusText.innerHTML = `➜ <span style="color: var(--danger); font-weight:bold;">${channel.name} এখন আনরিচেবল — সব সোর্স ডাউন আছে, কিছুক্ষণ পর আবার ট্রাই করো ⚠️</span>`;
                    return;
                }

                currentChannel = channel;
                currentSourceIndex = sourceIndex;
                clearTimeout(stallTimer);

                const url = channel.urls[sourceIndex];

                if (sourceIndex > 0) {
                    statusText.innerHTML = `➜ Trying backup source (${sourceIndex + 1}/${channel.urls.length}) for <span style="color: var(--neon-cyan); font-weight:bold;">${channel.name}</span>...`;
                } else {
                    statusText.innerHTML = `➜ Playing: <span style="color: var(--neon-cyan); font-weight:bold;">${channel.name}</span>`;
                }

                videoPlayer.src({
                    src: url,
                    type: 'application/x-mpegURL'
                });

                // If this source errors out (dead link, blocked, etc.) automatically
                // try the next available url for this same channel, if any.
                videoPlayer.one('error', function () {
                    attemptPlay(channel, videoPlayer, sourceIndex + 1);
                });

                videoPlayer.play().catch(e => console.log("Playback handling:", e));
            }

            function playChannel(channel, btn, videoPlayer) {
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                if (btn) btn.classList.add('active');

                // clear any pending fallback handler left over from a previous channel
                videoPlayer.off('error');

                attemptPlay(channel, videoPlayer, 0);
            }

            function renderChannels(channels, videoPlayer, autoplayFirst, query = '') {
                gridContainer.innerHTML = '';

                if (channels.length === 0) {
                    gridContainer.innerHTML = '<div class="no-results"><i class="fas fa-ghost"></i> No channel found matching your search.</div>';
                    return;
                }

                channels.forEach((channel, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'channel-btn';
                    btn.innerHTML = highlightMatch(channel.name, query);
                    btn.title = channel.name;

                    btn.addEventListener('click', function () {
                        playChannel(channel, btn, videoPlayer);
                    });

                    gridContainer.appendChild(btn);

                    if (autoplayFirst && index === 0) {
                        btn.classList.add('active');
                        videoPlayer.off('error');
                        attemptPlay(channel, videoPlayer, 0);
                    }
                });
            }

            searchInput.addEventListener('input', function () {
                const query = searchInput.value.trim();
                searchClearBtn.style.display = query ? 'block' : 'none';

                const filtered = query
                    ? allChannels.filter(ch => ch.name.toLowerCase().includes(query.toLowerCase()))
                    : allChannels;

                renderChannels(filtered, player, false, query);
            });

            searchClearBtn.addEventListener('click', function () {
                searchInput.value = '';
                searchClearBtn.style.display = 'none';
                renderChannels(allChannels, player, false, '');
                searchInput.focus();
            });

            loadM3uPlaylist();
        });
    </script>
</body>
</html>
